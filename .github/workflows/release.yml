name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Enforce JDK 17
        run: |
          echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV
          echo "${{ steps.setup-java.outputs.path }}/bin" >> $GITHUB_PATH

      - name: Run unit tests
        run: |
          ./gradlew test --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > gitforandroid.keystore

      - name: Build release APK
        run: |
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/git-for-android-v*.apk
          generate_release_notes: true
