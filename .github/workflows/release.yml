name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Enforce JDK 17
        run: |
          echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV
          echo "${{ steps.setup-java.outputs.path }}/bin" >> $GITHUB_PATH

      - name: Run unit tests
        run: |
          ./gradlew test --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore gitforandroid.keystore \
            -storetype PKCS12 \
            -alias gitforandroid \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=GitForAndroid, OU=Dev, O=GitForAndroid, L=Unknown, ST=Unknown, C=CN"

      - name: Build release APK
        run: |
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
