name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Enforce JDK 17
        run: |
          echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV
          echo "${{ steps.setup-java.outputs.path }}/bin" >> $GITHUB_PATH

      - name: Run unit tests
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          $JAVA_HOME/bin/java -version
          ./gradlew test --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
